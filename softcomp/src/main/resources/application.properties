# Nom de l'application Spring Boot
spring.application.name=softcomp

# URI de connexion MongoDB (correction : spring.data.mongodb.uri au lieu de spring.mongodb.uri)
spring.mongodb.uri=mongodb://localhost:27017/softcomp

# ---- Configuration MQTT ----
# URL du broker MQTT (protocole TCP, port 1883)
mqtt.broker-url=tcp://sr-labor.ddns.net:1883

# Identifiant unique du client MQTT pour cette instance
mqtt.client-id=softcomp-client

# Credentials d'authentification MQTT fournis par le PoC
mqtt.username=brice.bopda-fokou@stud.hs-bochum.de
mqtt.password=018375437

# Topics d'abonnement pour l'automate Wago 750
# Wago750/Status : réception du statut des lumières (entier 16 bits)
# Wago750/Control : publication des commandes de contrôle
mqtt.topics-wago=Wago750/Status,Wago750/Control

# Topics Siemens individuels — injectés via @Value dans SiemensService
mqtt.topic.siemens.ist=S7_1500/Temperatur/Ist
mqtt.topic.siemens.soll=S7_1500/Temperatur/Soll
mqtt.topic.siemens.differenz=S7_1500/Temperatur/Differenz

# Topic de publication des commandes de contrôle Wago (utilisé par le handler outbound)
mqtt.control-topic=Wago750/Control

# Port HTTP de l'application (évite le conflit avec le port 8080 par défaut)
server.port=8090